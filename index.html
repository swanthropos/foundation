<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #0a0a0a, #000000);
      color: #e0e0e0;
      font-family: "Georgia", "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 720px;
      padding: 20px;
    }

    .name {
      font-size: 2.6rem;
      letter-spacing: 0.18em;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 1rem;
      color: #aaaaaa;
      margin-bottom: 30px;
      letter-spacing: 0.12em;
    }

    .om {
      font-size: 2rem;
      margin: 20px 0;
      color: #ff671f;
      opacity: 0.8;
    }

    .line {
      width: 60px;
      height: 1px;
      background: #444;
      margin: 30px auto;
    }

    .tagline {
      font-size: 1.15rem;
      line-height: 1.9;
      color: #cccccc;
    }

    .ai {
      font-family: "Courier New", monospace;
      color: #8ab4f8;
    }

    .footer {
      margin-top: 60px;
      font-size: 0.85rem;
      color: #777;
      letter-spacing: 0.1em;
    }
  </style>
</head>

<body>
  <div class="container">
    
    <div class="name">
      कोऽहम
    </div>

    <div class="subtitle">
      AI Foundation
    </div>

    <div class="om">
      ॐ
    </div>

    <div class="line"></div>

    <div class="tagline">
      A space for inquiry into <span class="ai">Intelligence</span> —<br/>
      through philosophy, yoga, and disciplined practice.<br/><br/>
      
      Exploring that which thinks,<br/>
      that which observes,<br/>
      and that which remains beyond both.
    </div>

    <div class="line"></div>

    <div class="footer">
      Silence · Practice · Inquiry
    </div>

  </div>
</body>
</html>
